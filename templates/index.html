<!DOCTYPE html>
<html>
<head>
    <title>Emergency Alert</title>

    <!-- Bootstrap for styling -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="text-center">

        <h1 class="mb-4">🚨 Emergency Alert System</h1>

        <button class="btn btn-danger btn-lg px-5 py-3" onclick="sendAlert()">
            🔴 SEND HELP
        </button>

        <p id="location" class="mt-4 text-info"></p>

        <!-- Sound -->
        <audio id="alarm" src="https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg"></audio>

    </div>
</div>

<script>
function sendAlert() {

    document.getElementById("alarm").play();

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(function(position) {

            let lat = position.coords.latitude;
            let lon = position.coords.longitude;

            document.getElementById("location").innerHTML =
                "📍 Location: " + lat + ", " + lon;

            window.location.href = "/alert?lat=" + lat + "&lon=" + lon;
        });
    } else {
        alert("Location not supported");
    }
}
</script>

</body>
</html>
